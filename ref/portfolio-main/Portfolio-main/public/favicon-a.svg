<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Premium dark metallic/glass background that pops in both light and dark tabs -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <!-- Silver foil effect for the symbol -->
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e4e4e7"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  
  <!-- Developer Terminal Prompt ">_" -->
  <path fill="none" stroke="url(#silver)" stroke-linecap="round" stroke-linejoin="round" stroke-width="11" d="M25 28 L53 50 L25 72" />
  <rect x="59" y="64" width="20" height="11" rx="2" fill="url(#silver)" />
</svg>
